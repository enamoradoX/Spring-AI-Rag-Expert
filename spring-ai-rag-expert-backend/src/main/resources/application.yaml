#debug: true

spring:
  application:
    name: spring-ai-rag-expert
  ai:
    vectorstore:
      milvus:
        client:
          host: "localhost"
          port: 19530
          username: ${MILVUS_USERNAME:root}
          password: ${MILVUS_PASSWORD:milvus}
        databaseName: "default"
        indexType: IVF_FLAT
        metricType: COSINE
        initialize-schema: true

sfg:
  aiapp:
    documentsToLoad:
      - classpath:/towvehicles.txt
      - classpath:/jiraTechnicalDocumentation.docx
      - classpath:/resumeFinal.pdf
      - https://yamahaoutboards.com/outboards/350-150-hp/in-line-4/f150-(i4)/pb_spt_open_212_f150xb_9-10-2020-occ
# Sportsman 212 - Weight 3,458 lbs
