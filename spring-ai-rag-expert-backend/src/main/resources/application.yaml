#      - https://yamahaoutboards.com/outboards/xto-offshore/v8-5-6l/xf425/pb_sct_380lxf_tr_xf425_8-30-2018_occ

aws:
  s3:
    enabled: true
    accessKeyId: ${S3_ACCESS_KEY_ID:OR_YOUR_OWN_ACCESS_KEY_ID}
    secretAccessKey: ${S3_SECRET_ACCESS_KEY:OR_YOUR_OWN_SECRET_ACCESS_KEY}
    bucketName: ${S3_BUCKET_NAME:OR_YOUR_OWN_BUCKET_NAME}
    endpoint-override: ${S3_END_POINT_OVERRIDE:OR_YOUR_OWN_ENDPOINT_OVERRIDE}
    path-style-access: true
    region: us-east-1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

chat:
  analytics:
    enabled: true
    max-recent-calls: 25
    provider: unknown
    model: unknown
    pricing:
      prompt-cost-per-1m-tokens: 0
      completion-cost-per-1m-tokens: 0

